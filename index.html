<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Colores exactos basados en tu imagen */
        body { background-color: #1a1a1a; }
        .bg-card { background-color: #2a2a2a; }
        .text-purple-custom { color: #c084fc; } /* Tono morado */
        .btn-cyan { background-color: #00e5ff; color: #000; font-weight: 700; transition: 0.2s; }
        .btn-cyan:hover { background-color: #00b8cc; }
        .btn-yellow { background-color: #ffb74d; color: #000; font-weight: 700; transition: 0.2s; }
        .btn-yellow:hover { background-color: #f5a623; }
        .border-purple-custom { border-left-color: #c084fc; }
    </style>
</head>
<body class="text-gray-200 p-8 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-custom">Gestor de Usuarios</h1>
        
        <div class="bg-card p-6 rounded-lg mb-6 shadow-md">
            <h2 class="text-xl font-bold mb-4 text-purple-custom">Registrar Nuevo</h2>
            
            <form id="uploadForm" class="flex flex-wrap gap-4 items-center">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" class="px-3 py-2 rounded text-black flex-grow outline-none focus:ring-2 focus:ring-purple-500" required>
                
                <select id="rol" name="rol" class="px-3 py-2 rounded text-black w-48 outline-none focus:ring-2 focus:ring-purple-500" required>
                    <option value="Estudiante">Estudiante</option>
                    <option value="Profesor">Profesor</option>
                    <option value="Administrador">Administrador</option>
                </select>
                
                <button type="submit" id="btn-guardar" class="btn-cyan px-6 py-2 rounded">Guardar</button>
            </form>
        </div>

        <div class="bg-card p-6 rounded-lg mb-6 shadow-md">
            <h2 class="text-lg font-bold mb-4 text-white">Buscar en la Base de Datos</h2>
            <div class="flex flex-wrap gap-4">
                <input type="text" id="input-buscar" placeholder="Nombre..." class="px-3 py-2 rounded text-black flex-grow outline-none focus:ring-2 focus:ring-cyan-400">
                <button id="btn-buscar" class="btn-cyan px-6 py-2 rounded">Buscar</button>
                <button id="btn-accion" class="btn-cyan px-6 py-2 rounded">Cargar Todos</button>
            </div>
        </div>

        <div id="contenedor-datos" class="space-y-4">
            </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE TU BACKEND EN RENDER ===
        const API_URL = "https://inventario-multimedia.onrender.com";

        // Referencias al DOM
        const btnAccion = document.getElementById('btn-accion');
        const btnBuscar = document.getElementById('btn-buscar');
        const contenedor = document.getElementById('contenedor-datos');
        const formulario = document.getElementById('uploadForm');

        // Función de seguridad contra inyecciones de código (XSS)
        const escaparHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag])
            );
        };

        // Renderizar las tarjetas con el diseño de tu imagen
        function renderizar(datos) {
            contenedor.innerHTML = "";
            if (datos.length === 0) {
                contenedor.innerHTML = "<p class='text-gray-400'>No hay registros en la base de datos.</p>";
                return;
            }

            datos.forEach(user => {
                const nombreSeguro = escaparHTML(user.nombre || user.titulo);
                const rolSeguro = escaparHTML(user.rol || user.descripcion);
                const idSeguro = escaparHTML(user._id);

                contenedor.innerHTML += `
                    <div class="bg-card p-5 rounded-lg border-l-[6px] border-purple-custom shadow-md">
                        <h3 class="font-bold text-xl text-white mb-2">${nombreSeguro}</h3>
                        <p class="text-gray-200 mb-1 text-sm">Rol: ${rolSeguro}</p>
                        <p class="text-xs text-gray-500 mb-4">ID: ${idSeguro}</p>
                        <div class="flex gap-3">
                            <button onclick="editarUsuario('${idSeguro}', '${nombreSeguro}', '${rolSeguro}')" class="btn-yellow px-4 py-1.5 rounded text-sm">Editar</button>
                            <button onclick="eliminarUsuario('${idSeguro}')" class="btn-cyan px-4 py-1.5 rounded text-sm">Eliminar</button>
                        </div>
                    </div>
                `;
            });
        }

        // Cargar todos los registros
        btnAccion.addEventListener('click', async () => {
            try {
                contenedor.innerHTML = "<p class='text-gray-400'>Cargando base de datos...</p>";
                const res = await fetch(`${API_URL}/datos`);
                if (!res.ok) throw new Error('Error al cargar los datos');
                renderizar(await res.json());
            } catch (error) {
                console.error(error);
                contenedor.innerHTML = "<p class='text-red-400'>No se pudo conectar con el servidor.</p>";
            }
        });

        // ==========================================
        // LA MAGIA PARA QUE NO SALGA PANTALLA BLANCA
        // ==========================================
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault(); // ¡Esta línea detiene la recarga del navegador!

            const nombre = document.getElementById('nombre').value.trim();
            const rol = document.getElementById('rol').value.trim();
            const btnGuardar = document.getElementById('btn-guardar');
            
            if (!nombre || !rol) return;
            
            try {
                // Estado de carga en el botón
                btnGuardar.innerText = "Guardando...";
                btnGuardar.disabled = true;

                // Tu backend usa Multer, así que necesitamos enviar los datos como FormData
                const formData = new FormData();
                formData.append('nombre', nombre);
                formData.append('rol', rol);

                const res = await fetch(`${API_URL}/guardar`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) throw new Error('Error al guardar en el servidor');
                
                // Si todo sale bien, limpiamos y recargamos visualmente
                formulario.reset(); 
                btnAccion.click(); 
                
            } catch (error) {
                alert("Hubo un problema de conexión al guardar.");
                console.error(error);
            } finally {
                // Restauramos el botón
                btnGuardar.innerText = "Guardar";
                btnGuardar.disabled = false;
            }
        });

        // Borrar usuario
        window.eliminarUsuario = async function(id) {
            if (!confirm("¿Seguro que deseas eliminar este registro permanentemente?")) return;
            try {
                const res = await fetch(`${API_URL}/eliminar/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Error al eliminar');
                btnAccion.click();
            } catch (error) {
                alert("Hubo un problema al eliminar el registro.");
                console.error(error);
            }
        }

        // Editar usuario
        window.editarUsuario = async function(id, nombreActual, rolActual) {
            const nuevoNombre = prompt("Edita el nombre:", nombreActual);
            if (nuevoNombre === null) return;

            const nuevoRol = prompt("Edita el rol:", rolActual);
            if (nuevoRol === null) return;

            if (nuevoNombre.trim() && nuevoRol.trim()) {
                try {
                    const res = await fetch(`${API_URL}/actualizar/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre: nuevoNombre.trim(), rol: nuevoRol.trim() })
                    });
                    if (!res.ok) throw new Error('Error al actualizar');
                    btnAccion.click();
                } catch (error) {
                    alert("Hubo un problema al actualizar el registro.");
                    console.error(error);
                }
            }
        }

        // Buscar usuario
        btnBuscar.addEventListener('click', async () => {
            const term = document.getElementById('input-buscar').value.trim();
            if (!term) {
                btnAccion.click(); 
                return;
            }
            try {
                contenedor.innerHTML = "<p class='text-gray-400'>Buscando...</p>";
                const res = await fetch(`${API_URL}/buscar/${term}`);
                if (!res.ok) throw new Error('Error en la búsqueda');
                renderizar(await res.json());
            } catch (error) {
                console.error(error);
                contenedor.innerHTML = "<p class='text-red-400'>Error al realizar la búsqueda.</p>";
            }
        });

        // Autocargar datos al iniciar la página
        document.addEventListener('DOMContentLoaded', () => btnAccion.click());
    </script>
</body>
</html>
