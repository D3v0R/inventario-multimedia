<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Subir Elemento a la Base de Datos NoSQL</h2>
        
        <form id="uploadForm" action="/api/multimedia" method="POST" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block font-medium">Título del Elemento:</label>
                <input type="text" name="titulo" required class="w-full border p-2 rounded">
            </div>

            <div>
                <label class="block font-medium">Descripción:</label>
                <textarea name="descripcion" class="w-full border p-2 rounded"></textarea>
            </div>

            <div>
                <label class="block font-medium">Seleccionar Imagen (PNG/JPG):</label>
                <input type="file" name="imagen" accept="image/*" required class="w-full">
            </div>

            <div>
                <label class="block font-medium">Seleccionar Audio (MP3/WAV):</label>
                <input type="file" name="audio" accept="audio/*" class="w-full">
            </div>

            <div>
                <label class="block font-medium">Seleccionar Video (MP4/AVI/MOV):</label>
                <input type="file" name="video" accept="video/*" class="w-full">
            </div>

            <button id="submitBtn" type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full transition-colors">
                Guardar en la Nube
            </button>
        </form>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Subiendo... por favor espera';
            btn.classList.replace('bg-blue-600', 'bg-gray-400');
            btn.classList.remove('hover:bg-blue-700');
        });
    </script>
</body>
</html>
