<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e7eb; }
        .bg-card { background-color: #2a2a2a; }
        .text-purple-custom { color: #c084fc; }
        .btn-cyan { background-color: #00e5ff; color: #000; font-weight: 700; }
        .btn-cyan:hover { background-color: #00b8cc; }
    </style>
</head>
<body class="p-8 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-custom">Gestor Multimedia NoSQL</h1>

        <div class="bg-card p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4 text-purple-custom">Subir Elemento Multimedia</h2>
            
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block font-medium mb-1">Título del Elemento:</label>
                    <input type="text" name="titulo" required class="w-full p-2 rounded text-black outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block font-medium mb-1">Descripción:</label>
                    <textarea name="descripcion" class="w-full p-2 rounded text-black outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                </div>
                <div>
                    <label class="block font-medium mb-1">Imagen (PNG/JPG):</label>
                    <input type="file" name="imagen" accept="image/*" class="w-full p-2 bg-gray-700 rounded text-sm">
                </div>
                <div>
                    <label class="block font-medium mb-1">Audio (MP3/WAV):</label>
                    <input type="file" name="audio" accept="audio/*" class="w-full p-2 bg-gray-700 rounded text-sm">
                </div>
                
                <button type="submit" id="btn-guardar" class="btn-cyan w-full py-2 rounded mt-2">Guardar en la Nube</button>
            </form>
        </div>

        <div id="contenedor-datos" class="space-y-4"></div>
    </div>

    <script>
        const formulario = document.getElementById('uploadForm');
        
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault(); // ¡La magia para que no se vaya a blanco!

            const btn = document.getElementById('btn-guardar');
            btn.innerText = "Subiendo...";
            btn.disabled = true;

            const formData = new FormData(e.target);

            try {
                // Asegúrate de que esta ruta coincida con la que definimos en tu server.js
                const res = await fetch('https://inventario-multimedia.onrender.com/guardar', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error('Error al subir');
                
                alert('¡Archivo guardado con éxito!');
                formulario.reset();
            } catch (err) {
                alert('Error al guardar: ' + err.message);
            } finally {
                btn.innerText = "Guardar en la Nube";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
