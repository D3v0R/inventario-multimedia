<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Gestor Multimedia</h2>
        
        <div id="uploadForm" class="space-y-4">
            <div>
                <label class="block font-medium">Título:</label>
                <input type="text" id="nombre" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block font-medium">Rol / Descripción:</label>
                <input type="text" id="rol" class="w-full border p-2 rounded">
            </div>
            <button id="btn-guardar" class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">
                Guardar en la Nube
            </button>
        </div>

        <hr class="my-6">

        <div class="flex gap-2 mb-4">
            <button id="btn-accion" class="bg-green-600 text-white px-4 py-2 rounded">Cargar Todos</button>
            <input type="text" id="input-buscar" placeholder="Buscar..." class="border p-2 rounded flex-grow">
            <button id="btn-buscar" class="bg-yellow-600 text-white px-4 py-2 rounded">Buscar</button>
        </div>

        <div id="contenedor-datos" class="space-y-4"></div>
    </div>

    <script>
        const API_URL = "https://inventario-backend-lwvi.onrender.com";

        const btnAccion = document.getElementById('btn-accion');
        const btnGuardar = document.getElementById('btn-guardar');
        const btnBuscar = document.getElementById('btn-buscar');
        const contenedor = document.getElementById('contenedor-datos');

        function renderizar(datos) {
            contenedor.innerHTML = "";
            datos.forEach(user => {
                contenedor.innerHTML += `
                    <div style="background: #2c2c2c; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #bb86fc; color: white;">
                        <h3 class="font-bold text-lg">${user.nombre}</h3>
                        <p>Rol: ${user.rol}</p>
                        <p style="font-size: 0.7em; color: #aaa;">ID: ${user._id}</p>
                        <div class="mt-2 flex gap-2">
                            <button onclick="editarUsuario('${user._id}', '${user.nombre}', '${user.rol}')" class="bg-purple-600 px-2 py-1 rounded text-sm">Editar</button>
                            <button onclick="eliminarUsuario('${user._id}')" class="bg-red-600 px-2 py-1 rounded text-sm">Borrar</button>
                        </div>
                    </div>
                `;
            });
        }

        btnAccion.addEventListener('click', async () => {
            const res = await fetch(`${API_URL}/datos`);
            renderizar(await res.json());
        });

        btnGuardar.addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const rol = document.getElementById('rol').value;
            if (!nombre) return alert("Escribe un nombre");
            await fetch(`${API_URL}/guardar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, rol })
            });
            document.getElementById('nombre').value = "";
            document.getElementById('rol').value = "";
            btnAccion.click();
        });

        async function eliminarUsuario(id) {
            await fetch(`${API_URL}/eliminar/${id}`, { method: 'DELETE' });
            btnAccion.click();
        }

        async function editarUsuario(id, nombreActual, rolActual) {
            const nuevoNombre = prompt("Edita el nombre:", nombreActual);
            const nuevoRol = prompt("Edita el rol:", rolActual);
            if (nuevoNombre && nuevoRol) {
                await fetch(`${API_URL}/actualizar/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nuevoNombre, rol: nuevoRol })
                });
                btnAccion.click();
            }
        }

        btnBuscar.addEventListener('click', async () => {
            const term = document.getElementById('input-buscar').value;
            if (!term) return;
            const res = await fetch(`${API_URL}/buscar/${term}`);
            renderizar(await res.json());
        });

        // Carga inicial
        document.addEventListener('DOMContentLoaded', () => btnAccion.click());
    </script>
</body>
</html>
