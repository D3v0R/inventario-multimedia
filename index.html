<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e7eb; }
        .bg-card { background-color: #2a2a2a; }
        .text-purple-custom { color: #c084fc; }
        .btn-cyan { background-color: #06b6d4; color: white; font-weight: 700; }
        .btn-cyan:hover { background-color: #0891b2; }
    </style>
</head>
<body class="p-8 font-sans">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-custom">Gestor Multimedia NoSQL</h1>

        <div class="bg-card p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4 text-purple-custom">Subir Elemento</h2>
            <form id="uploadForm" class="space-y-4">
                <input type="text" name="titulo" placeholder="Título" required class="w-full p-2 rounded text-black outline-none">
                <textarea name="descripcion" placeholder="Descripción" class="w-full p-2 rounded text-black outline-none"></textarea>
                
                <div class="text-sm bg-gray-800 p-3 rounded">
                    <div class="mb-2">
                        <label class="font-bold text-gray-300">Imagen:</label> 
                        <input type="file" name="imagen" accept="image/*" class="ml-2 text-gray-400">
                    </div>
                    <div>
                        <label class="font-bold text-gray-300">Audio:</label> 
                        <input type="file" name="audio" accept="audio/*" class="ml-4 text-gray-400">
                    </div>
                </div>
                
                <button type="submit" id="btn-guardar" class="btn-cyan w-full py-2 rounded">Guardar en la Nube</button>
            </form>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="btn-accion" class="bg-green-600 px-4 py-2 rounded font-bold">Cargar Todos</button>
            <input type="text" id="input-buscar" placeholder="Buscar..." class="p-2 rounded flex-grow text-black outline-none">
            <button id="btn-buscar" class="bg-yellow-500 px-4 py-2 rounded text-black font-bold">Buscar</button>
        </div>

        <div id="contenedor-datos" class="space-y-4"></div>
    </div>

    <script>
        const API_URL = "https://inventario-multimedia.onrender.com";
        const contenedor = document.getElementById('contenedor-datos');
        const formulario = document.getElementById('uploadForm');

        // Función para renderizar tarjetas (Ahora con Imagen, Audio y Editar)
        function renderizar(datos) {
            contenedor.innerHTML = datos.length ? "" : "<p class='text-center text-gray-400'>No hay datos guardados aún.</p>";
            
            datos.forEach(item => {
                // Rutas de archivos
                const rutaImagen = item.archivos && item.archivos.imagen ? item.archivos.imagen : null;
                const rutaAudio = item.archivos && item.archivos.audio ? item.archivos.audio : null;
                
                // Elementos HTML
                const imagenHTML = rutaImagen ? `<img src="${API_URL}/${rutaImagen}" class="w-full h-48 object-cover mb-2 rounded" alt="Imagen">` : '';
                const audioHTML = rutaAudio ? `<audio controls class="w-full mt-3"><source src="${API_URL}/${rutaAudio}"></audio>` : '';

                contenedor.innerHTML += `
                    <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-purple-400 mb-4 shadow-lg">
                        ${imagenHTML}
                        <h3 class="font-bold text-xl text-white">${item.titulo}</h3>
                        <p class="text-gray-400 mt-1">${item.descripcion}</p>
                        ${audioHTML}
                        <div class="mt-4 flex gap-2">
                            <button onclick="editar('${item._id}', '${item.titulo}')" class="bg-blue-600 hover:bg-blue-700 px-4 py-1 rounded text-sm font-bold transition">Editar Título</button>
                            <button onclick="eliminar('${item._id}')" class="bg-red-600 hover:bg-red-700 px-4 py-1 rounded text-sm font-bold transition">Borrar</button>
                        </div>
                    </div>`;
            });
        }

        // CRUD: Create (Envía FormData con archivos)
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target); 
            
            try {
                const res = await fetch(`${API_URL}/guardar`, { 
                    method: 'POST', 
                    body: formData 
                });

                if (res.ok) { 
                    formulario.reset(); 
                    document.getElementById('btn-accion').click(); 
                } else {
                    alert("Error al guardar en el servidor.");
                }
            } catch (err) {
                console.error("Error de conexión:", err);
            }
        });

        // CRUD: Read
        document.getElementById('btn-accion').addEventListener('click', async () => {
            try {
                const res = await fetch(`${API_URL}/datos`);
                renderizar(await res.json());
            } catch (err) {
                console.error("Error al cargar datos:", err);
            }
        });

        // CRUD: Update (Editar)
        async function editar(id, tituloActual) {
            const nuevoTitulo = prompt("Ingresa el nuevo título:", tituloActual);
            
            if (nuevoTitulo && nuevoTitulo.trim() !== "" && nuevoTitulo !== tituloActual) {
                try {
                    await fetch(`${API_URL}/actualizar/${id}`, { 
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titulo: nuevoTitulo })
                    });
                    document.getElementById('btn-accion').click(); // Recargar datos
                } catch (err) {
                    console.error("Error al actualizar:", err);
                }
            }
        }

        // CRUD: Delete
        async function eliminar(id) {
            if(confirm("¿Seguro que quieres borrar este elemento?")) {
                try {
                    await fetch(`${API_URL}/eliminar/${id}`, { method: 'DELETE' });
                    document.getElementById('btn-accion').click(); // Recargar datos
                } catch (err) {
                    console.error("Error al eliminar:", err);
                }
            }
        }

        // Carga inicial automática
        document.getElementById('btn-accion').click();
    </script>
</body>
</html>
