<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e7eb; }
        .bg-card { background-color: #2a2a2a; }
        .text-purple-custom { color: #c084fc; }
        .btn-cyan { background-color: #06b6d4; color: white; font-weight: 700; }
        .btn-cyan:hover { background-color: #0891b2; }
    </style>
</head>
<body class="p-8 font-sans relative">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-custom">Gestor Multimedia NoSQL</h1>

        <div class="bg-card p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4 text-purple-custom">Subir Elemento</h2>
            <form id="uploadForm" class="space-y-4">
                <input type="text" name="titulo" placeholder="Título" required class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white outline-none focus:border-purple-500 transition-colors">
                
                <textarea name="descripcion" placeholder="Descripción" class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white outline-none focus:border-purple-500 transition-colors"></textarea>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-purple-500 border-dashed rounded-lg cursor-pointer bg-gray-900 hover:bg-gray-800 transition-colors group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-2 text-purple-400 group-hover:text-purple-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="mb-1 text-sm text-purple-400 group-hover:text-purple-300 font-bold">Seleccionar Imagen</p>
                            <p id="texto-imagen" class="text-xs text-gray-500 truncate max-w-[150px]">Ningún archivo</p>
                        </div>
                        <input type="file" name="imagen" accept="image/*" class="hidden" onchange="document.getElementById('texto-imagen').textContent = this.files[0] ? this.files[0].name : 'Ningún archivo'">
                    </label>

                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-cyan-500 border-dashed rounded-lg cursor-pointer bg-gray-900 hover:bg-gray-800 transition-colors group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-2 text-cyan-400 group-hover:text-cyan-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                            <p class="mb-1 text-sm text-cyan-400 group-hover:text-cyan-300 font-bold">Seleccionar Audio</p>
                            <p id="texto-audio" class="text-xs text-gray-500 truncate max-w-[150px]">Ningún archivo</p>
                        </div>
                        <input type="file" name="audio" accept="audio/*" class="hidden" onchange="document.getElementById('texto-audio').textContent = this.files[0] ? this.files[0].name : 'Ningún archivo'">
                    </label>

                </div>
                
                <button type="submit" id="btn-guardar" class="btn-cyan w-full py-3 mt-4 rounded uppercase tracking-wider">Guardar en la Nube</button>
            </form>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-accion" class="bg-green-600 hover:bg-green-700 transition-colors px-4 py-2 rounded font-bold shadow-md">Cargar Todos</button>
            <input type="text" id="input-buscar" placeholder="Buscar elemento..." class="p-2 rounded flex-grow bg-gray-800 border border-gray-700 text-white outline-none focus:border-yellow-500">
            <button id="btn-buscar" class="bg-yellow-500 hover:bg-yellow-600 transition-colors px-4 py-2 rounded text-black font-bold shadow-md">Buscar</button>
        </div>

        <div id="contenedor-datos" class="space-y-4"></div>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50">
        <div class="bg-card p-6 rounded-lg shadow-2xl w-full max-w-xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">Editar Elemento</h2>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="edit-id" name="id">
                
                <input type="text" id="edit-titulo" name="titulo" placeholder="Título" required class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white outline-none focus:border-blue-500 transition-colors">
                
                <textarea id="edit-descripcion" name="descripcion" placeholder="Descripción" class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white outline-none focus:border-blue-500 transition-colors"></textarea>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-gray-600 border-dashed rounded-lg cursor-pointer bg-gray-900 hover:bg-gray-800 transition-colors group">
                        <span class="text-sm text-gray-400 font-bold mb-1">Nueva Imagen (Opcional)</span>
                        <span id="edit-texto-imagen" class="text-xs text-gray-500 truncate max-w-[150px]">Mantener actual</span>
                        <input type="file" name="imagen" accept="image/*" class="hidden" onchange="document.getElementById('edit-texto-imagen').textContent = this.files[0] ? this.files[0].name : 'Mantener actual'">
                    </label>

                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-gray-600 border-dashed rounded-lg cursor-pointer bg-gray-900 hover:bg-gray-800 transition-colors group">
                        <span class="text-sm text-gray-400 font-bold mb-1">Nuevo Audio (Opcional)</span>
                        <span id="edit-texto-audio" class="text-xs text-gray-500 truncate max-w-[150px]">Mantener actual</span>
                        <input type="file" name="audio" accept="audio/*" class="hidden" onchange="document.getElementById('edit-texto-audio').textContent = this.files[0] ? this.files[0].name : 'Mantener actual'">
                    </label>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="cerrarModal()" class="w-1/2 py-3 bg-gray-600 hover:bg-gray-500 rounded font-bold text-white transition-colors">Cancelar</button>
                    <button type="submit" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-500 rounded font-bold text-white transition-colors shadow-lg">Actualizar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://inventario-multimedia.onrender.com";
        const contenedor = document.getElementById('contenedor-datos');
        const formulario = document.getElementById('uploadForm');
        const editForm = document.getElementById('editForm');
        const modalEditar = document.getElementById('modal-editar');

        function renderizar(datos) {
            contenedor.innerHTML = datos.length ? "" : "<p class='text-center text-gray-500 italic mt-8'>No hay datos guardados aún.</p>";
            
            datos.forEach(item => {
                const rutaImagen = item.archivos && item.archivos.imagen ? item.archivos.imagen : null;
                const rutaAudio = item.archivos && item.archivos.audio ? item.archivos.audio : null;
                
                const imagenHTML = rutaImagen ? `<img src="${API_URL}/${rutaImagen}" class="w-full h-56 object-cover mb-3 rounded shadow-md" alt="Imagen">` : '';
                const audioHTML = rutaAudio ? `<audio controls class="w-full mt-3 rounded"><source src="${API_URL}/${rutaAudio}"></audio>` : '';

                // Escapar comillas para evitar errores en el onclick
                const tituloEscapado = item.titulo ? item.titulo.replace(/'/g, "\\'") : '';
                const descEscapada = item.descripcion ? item.descripcion.replace(/'/g, "\\'") : '';

                contenedor.innerHTML += `
                    <div class="bg-gray-800 p-5 rounded-lg border-l-4 border-purple-500 mb-4 shadow-xl hover:bg-gray-750 transition-all">
                        ${imagenHTML}
                        <h3 class="font-bold text-2xl text-white tracking-wide">${item.titulo}</h3>
                        <p class="text-gray-400 mt-2 leading-relaxed">${item.descripcion || ''}</p>
                        ${audioHTML}
                        <div class="mt-5 flex gap-3">
                            <button onclick="abrirModal('${item._id}', '${tituloEscapado}', '${descEscapada}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-sm font-bold transition-colors shadow">Editar</button>
                            <button onclick="eliminar('${item._id}')" class="bg-red-600 hover:bg-red-500 px-4 py-1.5 rounded text-sm font-bold transition-colors shadow">Borrar</button>
                        </div>
                    </div>`;
            });
        }

        // --- MANEJO DEL MODAL DE EDICIÓN ---
        function abrirModal(id, titulo, descripcion) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-titulo').value = titulo;
            document.getElementById('edit-descripcion').value = descripcion;
            document.getElementById('edit-texto-imagen').textContent = 'Mantener actual';
            document.getElementById('edit-texto-audio').textContent = 'Mantener actual';
            modalEditar.classList.remove('hidden');
        }

        function cerrarModal() {
            modalEditar.classList.add('hidden');
            editForm.reset();
        }

        // --- SUBIR NUEVO ELEMENTO ---
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target); 
            
            try {
                const res = await fetch(`${API_URL}/guardar`, { 
                    method: 'POST', 
                    body: formData 
                });

                if (res.ok) { 
                    formulario.reset(); 
                    document.getElementById('texto-imagen').textContent = 'Ningún archivo';
                    document.getElementById('texto-audio').textContent = 'Ningún archivo';
                    document.getElementById('btn-accion').click(); 
                } else {
                    alert("Error al guardar en el servidor.");
                }
            } catch (err) {
                console.error("Error de conexión:", err);
            }
        });

        // --- ACTUALIZAR ELEMENTO EXISTENTE ---
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const formData = new FormData(e.target);
            
            // Eliminar archivos vacíos para que no sobreescriban los existentes en el backend si el usuario no seleccionó nada nuevo
            if (!formData.get('imagen').name) formData.delete('imagen');
            if (!formData.get('audio').name) formData.delete('audio');

            try {
                // Al enviar archivos, ya NO usamos JSON, mandamos FormData directamente
                const res = await fetch(`${API_URL}/actualizar/${id}`, { 
                    method: 'PUT',
                    body: formData
                });

                if (res.ok) {
                    cerrarModal();
                    document.getElementById('btn-accion').click();
                } else {
                    alert("Error al actualizar en el servidor.");
                }
            } catch (err) {
                console.error("Error al actualizar:", err);
            }
        });

        document.getElementById('btn-accion').addEventListener('click', async () => {
            try {
                const res = await fetch(`${API_URL}/datos`);
                renderizar(await res.json());
            } catch (err) {
                console.error("Error al cargar datos:", err);
            }
        });

        document.getElementById('btn-buscar').addEventListener('click', async (e) => {
            e.preventDefault(); 
            const termino = document.getElementById('input-buscar').value.trim();
            
            if (termino === '') {
                document.getElementById('btn-accion').click();
                return;
            }

            try {
                const res = await fetch(`${API_URL}/buscar/${termino}`);
                if (!res.ok) throw new Error("Error al conectar con el servidor");
                const datos = await res.json();
                renderizar(datos); 
            } catch (err) {
                console.error("Fallo crítico en la búsqueda:", err);
            }
        });

        async function eliminar(id) {
            if(confirm("¿Seguro que quieres borrar este elemento?")) {
                try {
                    await fetch(`${API_URL}/eliminar/${id}`, { method: 'DELETE' });
                    document.getElementById('btn-accion').click();
                } catch (err) {
                    console.error("Error al eliminar:", err);
                }
            }
        }

        // Carga inicial
        document.getElementById('btn-accion').click();
    </script>
</body>
</html>
