<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e7eb; }
        .bg-card { background-color: #2a2a2a; }
        .text-purple-custom { color: #c084fc; }
        .btn-cyan { background-color: #06b6d4; color: white; font-weight: 700; }
        .btn-cyan:hover { background-color: #0891b2; }
    </style>
</head>
<body class="p-8 font-sans">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-custom">Gestor Multimedia NoSQL</h1>

        <div class="bg-card p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4 text-purple-custom">Subir Elemento</h2>
            <form id="uploadForm" class="space-y-4">
                <input type="text" name="titulo" placeholder="Título" required class="w-full p-2 rounded text-black outline-none">
                <textarea name="descripcion" placeholder="Descripción" class="w-full p-2 rounded text-black outline-none"></textarea>
                <div class="text-sm">
                    <label>Imagen:</label> <input type="file" name="imagen" accept="image/*">
                </div>
                <button type="submit" id="btn-guardar" class="btn-cyan w-full py-2 rounded">Guardar en la Nube</button>
            </form>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="btn-accion" class="bg-green-600 px-4 py-2 rounded">Cargar Todos</button>
            <input type="text" id="input-buscar" placeholder="Buscar..." class="p-2 rounded flex-grow text-black">
            <button id="btn-buscar" class="bg-yellow-500 px-4 py-2 rounded text-black">Buscar</button>
        </div>

        <div id="contenedor-datos" class="space-y-4"></div>
    </div>

    <script>
        const API_URL = "https://inventario-multimedia.onrender.com";
        const contenedor = document.getElementById('contenedor-datos');
        const formulario = document.getElementById('uploadForm');

        // Función para renderizar tarjetas
function renderizar(datos) {
    const contenedor = document.getElementById('contenedor-datos');
        contenedor.innerHTML = "";

        datos.forEach(item => {
// Log para ver qué estamos intentando cargar
        console.log("Ruta de imagen intentada:", item.imagenUrl);

// Si tienes imagenUrl, la usamos; si no, dejamos vacío
        const imagenHTML = item.imagenUrl ? 
        `<img src="${API_URL}/${item.imagenUrl}" class="w-full h-48 object-cover mb-2 rounded" onerror="this.style.display='none'">` : '';

        contenedor.innerHTML += `
        <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-purple-400">
        ${imagenHTML}
        <h3 class="font-bold text-lg">${item.titulo || item.nombre}</h3>
        <p class="text-gray-300">${item.descripcion || item.rol}</p>
        <div class="mt-3 flex gap-2">
        <button onclick="eliminar('${item._id}')" class="bg-red-600 px-3 py-1 rounded text-sm">Borrar</button>
        /div>
        </div>`;
    });
}

        // CRUD: Create (Actualizado para enviar JSON)
formulario.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Obtenemos los datos del formulario
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    const res = await fetch(`${API_URL}/guardar`, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, // Decimos que enviamos JSON
        body: JSON.stringify(data) // Convertimos a texto
    });

    if (res.ok) { 
        formulario.reset(); 
        document.getElementById('btn-accion').click(); 
    } else {
        const error = await res.text();
        console.error("Error del servidor:", error);
    }
});

        // CRUD: Read
        document.getElementById('btn-accion').addEventListener('click', async () => {
            const res = await fetch(`${API_URL}/datos`);
            renderizar(await res.json());
        });

        // CRUD: Delete
        async function eliminar(id) {
            await fetch(`${API_URL}/eliminar/${id}`, { method: 'DELETE' });
            document.getElementById('btn-accion').click();
        }

        // Carga inicial
        document.getElementById('btn-accion').click();
    </script>
</body>
</html>
